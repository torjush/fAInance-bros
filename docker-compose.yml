version: "2.4"

services:
  analyzer:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/data/finance_agents.db
      - REPORTS_DIR=/data/reports
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:unconfined
